<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello</title>
    <style>
      :root {
        --bg: #020202;
        --fg: #f5f5f7;
        --fg-soft: rgba(245, 245, 247, 0.7);
        --glow-a: rgba(84, 169, 255, 0.18);
        --glow-b: rgba(255, 255, 255, 0.1);
        --shadow: rgba(0, 0, 0, 0.45);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        position: relative;
        overflow: hidden;
        background:
          radial-gradient(circle at 50% 35%, rgba(255, 255, 255, 0.08), transparent 24%),
          radial-gradient(circle at 20% 25%, var(--glow-a), transparent 32%),
          radial-gradient(circle at 80% 70%, var(--glow-b), transparent 28%),
          linear-gradient(180deg, #080808 0%, var(--bg) 40%, #000000 100%);
        color: var(--fg);
        font-family: "SF Pro Display", "SF Pro Text", -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      body::before,
      body::after {
        content: "";
        position: fixed;
        inset: -20%;
        pointer-events: none;
      }

      body::before {
        background:
          radial-gradient(circle at 32% 28%, rgba(112, 196, 255, 0.2), transparent 20%),
          radial-gradient(circle at 72% 62%, rgba(255, 255, 255, 0.08), transparent 18%);
        filter: blur(70px);
        animation: ambienceDrift 16s ease-in-out infinite alternate;
      }

      body::after {
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.04), transparent 18%, transparent 82%, rgba(255, 255, 255, 0.04)),
          radial-gradient(circle at center, transparent 44%, rgba(0, 0, 0, 0.48) 100%);
        opacity: 0.9;
      }

      .screen {
        position: relative;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 6vh 5vw;
        isolation: isolate;
      }

      .sequence {
        position: relative;
        width: min(92vw, 1040px);
        min-height: min(44vh, 420px);
      }

      .sequence::before {
        content: "";
        position: absolute;
        inset: 14% 8%;
        border-radius: 999px;
        background: radial-gradient(circle at center, rgba(255, 255, 255, 0.1), transparent 68%);
        filter: blur(40px);
        opacity: 0.55;
        transform: scale(1.08);
        z-index: -1;
      }

      .phrase {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        align-content: center;
        gap: 0.14em;
        padding: 0 3vw;
        text-align: center;
        opacity: 0;
        transform: translate3d(0, 22px, 0) scale(0.92);
        filter: blur(18px);
        pointer-events: none;
      }

      .phrase.active {
        opacity: 1;
        transform: translate3d(0, 0, 0) scale(1);
        filter: blur(0);
        transition:
          opacity 900ms cubic-bezier(0.22, 1, 0.36, 1),
          transform 1400ms cubic-bezier(0.16, 1, 0.3, 1),
          filter 1000ms cubic-bezier(0.2, 0.9, 0.2, 1);
      }

      .phrase.exit {
        opacity: 0;
        transform: translate3d(0, -18px, 0) scale(1.05);
        filter: blur(16px);
        transition:
          opacity 780ms cubic-bezier(0.4, 0, 1, 1),
          transform 780ms cubic-bezier(0.4, 0, 1, 1),
          filter 780ms cubic-bezier(0.4, 0, 1, 1);
      }

      .line {
        display: block;
        line-height: 0.96;
        letter-spacing: -0.055em;
        text-wrap: balance;
        text-shadow: 0 14px 35px var(--shadow);
      }

      .phrase-hero .line {
        font-size: clamp(5rem, 16vw, 10rem);
        font-weight: 600;
      }

      .phrase-soft .line {
        font-size: clamp(2.6rem, 8vw, 5.4rem);
        font-weight: 500;
        color: var(--fg-soft);
      }

      .phrase-strong .line {
        font-size: clamp(3rem, 9vw, 6rem);
        font-weight: 580;
      }

      .phrase-final {
        gap: 0.04em;
      }

      .phrase-final .line {
        font-size: clamp(2.7rem, 8vw, 5.5rem);
        font-weight: 520;
      }

      .phrase-final .line:last-child {
        color: #ffffff;
        font-weight: 630;
      }

      .char {
        display: inline-block;
        opacity: 0;
        transform: translateY(0.62em) scale(0.94);
        filter: blur(10px);
        will-change: transform, opacity, filter;
        transition:
          opacity 720ms cubic-bezier(0.22, 1, 0.36, 1),
          transform 1100ms cubic-bezier(0.16, 1, 0.3, 1),
          filter 900ms cubic-bezier(0.2, 0.9, 0.2, 1);
        transition-delay: 0ms;
      }

      .phrase.active .char {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
        transition-delay: calc(var(--char-index) * 28ms + 90ms);
      }

      .phrase.exit .char {
        opacity: 0;
        transform: translateY(-0.38em) scale(1.04);
        filter: blur(9px);
        transition-delay: calc(var(--char-reverse-index) * 12ms);
      }

      @keyframes ambienceDrift {
        from {
          transform: translate3d(-2%, -1%, 0) scale(1);
        }
        to {
          transform: translate3d(2%, 2%, 0) scale(1.08);
        }
      }

      @media (max-width: 720px) {
        .screen {
          padding: 7vh 6vw;
        }

        .sequence {
          min-height: 34vh;
        }

        .phrase {
          padding: 0;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        body::before {
          animation: none;
        }

        .phrase,
        .char,
        .phrase.active,
        .phrase.exit {
          transition-duration: 1ms !important;
          transition-delay: 0ms !important;
        }
      }
    </style>
  </head>
  <body>
    <main class="screen">
      <section class="sequence" aria-live="polite">
        <article class="phrase phrase-hero" data-min-duration="2600">
          <span class="line">Hello</span>
        </article>

        <article class="phrase phrase-soft" data-min-duration="2400">
          <span class="line">je te souhaite</span>
        </article>

        <article class="phrase phrase-strong" data-min-duration="2700">
          <span class="line">un anniversaire</span>
        </article>

        <article class="phrase phrase-soft" data-min-duration="2500">
          <span class="line">a ma façon</span>
        </article>

        <article class="phrase phrase-final" data-min-duration="4200">
          <span class="line">realisé avec</span>
          <span class="line">grand plaisir.</span>
        </article>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
